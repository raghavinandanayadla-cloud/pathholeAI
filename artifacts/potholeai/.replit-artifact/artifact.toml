kind = "web"
previewPath = "/"
title = "PotholeAI"
version = "1.0.0"
id = "artifacts/potholeai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23331

[services.development]
run = "pnpm --filter @workspace/potholeai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/potholeai", "run", "build" ]
serve = "static"
publicDir = "artifacts/potholeai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23331"
BASE_PATH = "/"
